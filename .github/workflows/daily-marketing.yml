name: Daily Marketing Posts

on:
  schedule:
    # Twitter: daily at 10am EST (3pm UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to post to'
        required: true
        type: choice
        options:
          - twitter
          - reddit
          - linkedin
      dry_run:
        description: 'Dry run (preview only, no posting)'
        required: false
        type: boolean
        default: false
      post_id:
        description: 'Specific post ID (optional, e.g. twitter_05)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  post-twitter:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'twitter')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.post_id }}" ]; then
            FLAGS="$FLAGS --post-id ${{ github.event.inputs.post_id }}"
          fi
          python marketing/post_scheduler.py --platform twitter $FLAGS

      - name: Commit post log
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/post_log.json
          git diff --staged --quiet || git commit -m "Update post log after Twitter post"
          git push

  post-reddit:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'reddit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install praw

      - name: Post to Reddit
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.post_id }}" ]; then
            FLAGS="$FLAGS --post-id ${{ github.event.inputs.post_id }}"
          fi
          python marketing/post_scheduler.py --platform reddit $FLAGS

      - name: Commit post log
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/post_log.json
          git diff --staged --quiet || git commit -m "Update post log after Reddit post"
          git push

  post-linkedin:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'linkedin'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.post_id }}" ]; then
            FLAGS="$FLAGS --post-id ${{ github.event.inputs.post_id }}"
          fi
          python marketing/post_scheduler.py --platform linkedin $FLAGS

      - name: Commit post log
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/post_log.json
          git diff --staged --quiet || git commit -m "Update post log after LinkedIn post"
          git push

  # Scheduled Reddit posting - runs every 3 days
  scheduled-reddit:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check if today is a Reddit day (every 3 days)
        id: check_day
        run: |
          DAY_OF_YEAR=$(date +%j)
          if [ $((DAY_OF_YEAR % 3)) -eq 0 ]; then
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_post=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check_day.outputs.should_post == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check_day.outputs.should_post == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check_day.outputs.should_post == 'true'
        run: pip install praw

      - name: Post to Reddit
        if: steps.check_day.outputs.should_post == 'true'
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: python marketing/post_scheduler.py --platform reddit

      - name: Commit post log
        if: steps.check_day.outputs.should_post == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/post_log.json
          git diff --staged --quiet || git commit -m "Update post log after scheduled Reddit post"
          git push
